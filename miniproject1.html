<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Webpage</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height:100vh;
            background-color:#f4f4f4;
            margin:0;
            margin:0;
            background:#0f172a;
            color:white;

        }
        h1{
            animation:fadeIn 2s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0;transform:translateY(-20px); }
            to { opacity: 1;transform:translateY(0); }
        }
        .btn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition:background-color 0.3s ease, transform 0.3s;
            animation: bounce 2s infinite;
        }
        .btn:hover {
            background-color:green;
            transform: scale(1.1);
        }
        .marquee-box{
width:100%;
overflow:hidden;
background:black;
color:white;
padding:10px;
}
.marquee-text{
display:inline-block;
white-space:nowrap;
padding-left:100%;

animation:scroll 10s linear infinite;
transition:1s;
}
@keyframes scroll{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-100%);
}
}

.video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-1;
}

/* CONTENT */

.content{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* NAVBAR */

nav{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
.title{
position:absolute;
bottom:10px;
left:10px;
opacity:0;
transition:0.5s;
}
.logo{
font-size:28px;
font-weight:bold;
color:#ff3c3c;
transition: all 1s ease;
}

.menu a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.menu a:hover{
color:#ff3c3c;
}

/* SEARCH */

.search{
text-align:center;
padding:20px;
}

.box{
width:200px;
height:100px;
background:red;
transition: background 1s ease;
}

.box:hover{
background:blue;
}

.search input{
width:300px;
padding:10px;
border-radius:20px;
border:none;
outline:none;
}

/* ANIME GRID */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

/* ANIME CARD */

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
transition:0.3s;

}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:10px;
}

/* BUTTON */

button{
margin:10px;
padding:10px 20px;
border:none;
background:#ff3c3c;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:yellow;
color:black;
}
.background{
    position:sticky;
    image-rendering: auto;
    transition:0.1s ;
}
.marquee-box{
overflow:hidden;
background:black;
color:white;
padding:10px;
}

.marquee-text{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:scroll 8s linear infinite;
}

.marquee-box:hover{
animation-play-state:paused;
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-100%);}
}

        
    </style>
</head>
<body>
    <h1>Welcome to My Animated Webpage</h1>
    <p>This is a simple animated webpage with some CSS animations and transitions.</p>
    <p>In this only have few anime shows</p>
    <a href="miniproject12.html"><button class="btn">Go to Anime Page</button></a>
</body>
</html>
